services:

    nexus_server:
        build:
            context: ./server
        container_name: nexus_server
        restart: always
        depends_on:
            redis:
                condition: service_started
            db:
                condition: service_healthy
        environment:
            REDIS_ADDR: ${REDIS_ADDR}
            DB_HOST: db
            DB_PORT: ${DB_PORT}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_NAME: ${DB_NAME}
        ports:
            - "${SERVER_PORT}:${SERVER_PORT}"

    redis:
        image: redis:7.4-alpine
        container_name: nexus_redis
        restart: always
        ports:
            - "${REDIS_PORT}:${REDIS_PORT}"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes

    db:
        image: postgres:17-alpine
        container_name: nexus_db
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "${DB_PORT}:${DB_PORT}"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U username -d nexus_database"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    redis_data:
    postgres_data:
